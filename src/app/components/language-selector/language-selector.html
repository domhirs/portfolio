<div
  class="flex items-center bg-surface-high rounded-full p-1 border border-muted/20 transition-opacity"
  [class.opacity-50]="disabled()"
  [class.cursor-not-allowed]="disabled()"
>
  <button
    [disabled]="disabled()"
    (click)="selectLanguage('de')"
    class="px-3 py-1 rounded-full text-sm font-bold transition-all duration-200 ease-in-out"
    [class.bg-surface-card]="currentLang() === 'de'"
    [class.text-on-surface]="currentLang() === 'de'"
    [class.text-on-surface-variant]="currentLang() !== 'de'"
    [class.hover:text-on-surface]="currentLang() !== 'de' && !disabled()"
  >
    DE
  </button>
  <button
    [disabled]="disabled()"
    (click)="selectLanguage('en')"
    class="px-3 py-1 rounded-full text-sm font-bold transition-all duration-200 ease-in-out"
    [class.bg-surface-card]="currentLang() === 'en'"
    [class.text-on-surface]="currentLang() === 'en'"
    [class.text-on-surface-variant]="currentLang() !== 'en'"
    [class.hover:text-on-surface]="currentLang() !== 'en' && !disabled()"
  >
    EN
  </button>
</div>
