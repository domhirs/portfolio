<div class="bg-surface-card border border-muted/20 shadow-sm rounded-2xl overflow-hidden transition-all duration-300 hover:border-muted/40 hover:shadow-md hover:bg-surface-high h-full flex flex-col">
  <div class="p-6 flex-grow">
    <div class="flex justify-between items-start mb-2">
      <div class="flex-grow">
        @if (title()) {
          <h3 class="text-xl font-bold text-on-surface leading-tight">{{ title() }}</h3>
        }
        @if (subtitle()) {
          <h4 class="text-md font-semibold text-on-surface-variant mt-1">{{ subtitle() }}</h4>
        }
      </div>
      @if (meta()) {
        <span class="text-sm text-on-surface-variant whitespace-nowrap ml-4 bg-surface-bright px-2 py-1 rounded-md border border-muted/20">{{ meta() }}</span>
      }
    </div>

    <div class="mt-4">
      <ng-content></ng-content>
    </div>
  </div>
</div>
