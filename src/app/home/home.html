<section id="home" class="min-h-screen flex flex-col items-center justify-center text-center">
  <img
    ngSrc="assets/picture.png"
    alt="Profile Picture"
    class="w-64 h-64 rounded-full object-cover mb-4"
    width="256"
    height="256"
  />
  <h1 class="text-5xl md:text-7xl font-bold text-white text-shadow-lg">{{ title() }}</h1>
  <p class="mt-4 text-lg font-semibold text-white text-shadow-lg">Full Stack Developer</p>
  <app-list>
    <app-breadcrumb [label]="'Angular'">
      <ng-icon name="diAngularOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'TypeScript'">
      <ng-icon name="diTypescriptOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'Node.js'">
      <ng-icon name="diNodejsOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'Tailwind CSS'">
      <ng-icon name="diTailwindcssOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'Vitest'">
      <ng-icon name="diVitestOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'Playwright'">
      <ng-icon name="diPlaywrightOriginal"></ng-icon>
    </app-breadcrumb>
  </app-list>
  <app-list>
    <app-breadcrumb [label]="'Docker'">
      <ng-icon name="diDockerOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'C#'">
      <ng-icon name="diDotnetcoreOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'Entity Framework'">
      <ng-icon name="diEntityframeworkcoreOriginal"></ng-icon>
    </app-breadcrumb>
    <app-breadcrumb [label]="'Microsoft SQL Server'">
      <ng-icon name="diMicrosoftsqlserverOriginal"></ng-icon>
    </app-breadcrumb>
  </app-list>
</section>
