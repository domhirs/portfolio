<div class="relative flex items-center justify-center px-8 h-full">
  <!-- Left Side: Image + Title (Absolutely positioned to not affect center) -->
  <div
    class="absolute left-8 flex items-center space-x-4 transition-opacity duration-300 ease-in-out"
    [class.opacity-0]="!isScrolled()"
    [class.opacity-100]="isScrolled()"
  >
    <img
      ngSrc="assets/picture-avatar.png"
      alt="Profile Picture"
      class="w-12 h-12 rounded-full object-cover"
      width="48"
      height="48"
    />
    <h1 class="text-xl font-bold text-white">{{ title() }}</h1>
  </div>


  <!-- Centered Navigation (always visible and centered) -->
  <nav>
    <ul class="flex list-none p-0">
      <li class="mx-2">
        <app-button [href]="'#home'" [label]="'Home'"></app-button>
      </li>
      <li class="mx-2">
        <app-button [href]="'#about'" [label]="'About'"></app-button>
      </li>
      <li class="mx-2">
        <app-button [href]="'#resume'" [label]="'Resume'"></app-button>
      </li>
      <li class="mx-2">
        <app-button [href]="'#projects'" [label]="'Projects'"></app-button>
      </li>
    </ul>
  </nav>
</div>
@if (maintenance()) {
  <div id="maintenance" class="bg-red-900 text-white text-center p-3 font-bold flex justify-center items-center"> Die
    Seite befindet sich gerade im Aufbau
  </div>
}
