<!-- Main Header Container -->
<div class="relative flex items-center justify-between md:justify-center px-4 sm:px-8 h-full">

  <!-- Left Side: Desktop User Info (Absolutely positioned) -->
  <div
    class="absolute left-8 hidden md:flex items-center space-x-4 transition-opacity duration-300 ease-in-out"
    [class.opacity-0]="!isScrolled()"
    [class.opacity-100]="isScrolled()"
  >
    <img
      ngSrc="assets/picture-avatar.png"
      alt="Profile Picture"
      class="w-12 h-12 rounded-full object-cover"
      width="48"
      height="48"
    />
    <h1 class="text-xl font-bold text-white">{{ title() }}</h1>
  </div>

  <!-- Left Side: Mobile User Info (Visible on mobile, fades in on scroll) -->
  <div
    class="flex md:hidden items-center space-x-4 transition-opacity duration-300 ease-in-out"
    [class.opacity-0]="!isScrolled()"
    [class.opacity-100]="isScrolled()"
  >
    <img
      ngSrc="assets/picture-avatar.png"
      alt="Profile Picture"
      class="w-12 h-12 rounded-full object-cover"
      width="48"
      height="48"
    />
  </div>

  <!-- Center: Title (Mobile only, fades in on scroll) -->
  <div
    class="flex md:hidden items-center transition-opacity duration-300 ease-in-out"
    [class.opacity-0]="!isScrolled()"
    [class.opacity-100]="isScrolled()"
  >
    <h1 class="text-xl font-bold text-white">{{ title() }}</h1>
  </div>

  <!-- Center: Desktop Navigation -->
  <nav class="hidden md:flex">
    <ul class="flex list-none p-0">
      <li class="mx-2"><app-button [href]="'#home'" [label]="'Home'"></app-button></li>
      <li class="mx-2"><app-button [href]="'#about'" [label]="'About'"></app-button></li>
      <li class="mx-2"><app-button [href]="'#resume'" [label]="'Resume'"></app-button></li>
      <li class="mx-2"><app-button [href]="'#projects'" [label]="'Projects'"></app-button></li>
    </ul>
  </nav>

  <!-- Right Side: Burger Menu Button (Mobile only) -->
  <div class="flex md:hidden items-center">
    <button (click)="isMenuOpen.set(true)" class="text-white p-2">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>
  </div>
</div>

<!-- Mobile Menu Overlay -->
@if (isMenuOpen()) {
  <div class="fixed inset-0 bg-gray-900/90 backdrop-blur-lg z-50 flex flex-col items-center justify-center">
    <button (click)="isMenuOpen.set(false)" class="absolute top-8 right-8 text-white p-2">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    <nav>
      <ul class="flex flex-col items-center space-y-8">
        <li><a (click)="isMenuOpen.set(false)" href="#home" class="text-3xl font-bold text-white">Home</a></li>
        <li><a (click)="isMenuOpen.set(false)" href="#about" class="text-3xl font-bold text-white">About</a></li>
        <li><a (click)="isMenuOpen.set(false)" href="#resume" class="text-3xl font-bold text-white">Resume</a></li>
        <li><a (click)="isMenuOpen.set(false)" href="#projects" class="text-3xl font-bold text-white">Projects</a></li>
      </ul>
    </nav>
  </div>
}

<!-- Maintenance Bar -->
@if (maintenance()) {
  <div id="maintenance" class="bg-red-900 text-white text-center p-3 font-bold flex justify-center items-center">
    Die Seite befindet sich gerade im Aufbau
  </div>
}
