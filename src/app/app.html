<app-header
  [maintenance]="maintenance()"
  [menuOpen]="isMenuOpen()"
  (menuToggled)="toggleMenu()"
></app-header>

<!-- Mobile Menu Overlay (Root Level) -->
@if (isMenuOpen()) {
  <div class="fixed inset-0 bg-gray-900/90 backdrop-blur-lg z-[100] flex flex-col items-center justify-center">
    <button (click)="toggleMenu()" class="absolute top-8 right-8 text-white p-2">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    <nav>
      <ul class="flex flex-col items-center space-y-8">
        <li><a (click)="toggleMenu()" href="#home" class="text-3xl font-bold text-white">Home</a></li>
        <li><a (click)="toggleMenu()" href="#about" class="text-3xl font-bold text-white">About</a></li>
        <li><a (click)="toggleMenu()" href="#resume" class="text-3xl font-bold text-white">Resume</a></li>
        <li><a (click)="toggleMenu()" href="#projects" class="text-3xl font-bold text-white">Projects</a></li>
      </ul>
    </nav>
  </div>
}

<app-home></app-home>

<main>
  <app-about></app-about>
  <app-resume></app-resume>
  <app-projects></app-projects>
</main>
